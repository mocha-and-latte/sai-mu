<!doctype html>
<html lang="th">
  <head>
    <base target="_top" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Kanit", sans-serif;
      }
      .cup {
        width: 120px;
        height: 180px;
        background: linear-gradient(to bottom, #b91c1c, #991b1b);
        border-radius: 20px 20px 10px 10px;
        margin: 0 auto;
        position: relative;
        border: 4px solid #f59e0b;
        transition: transform 0.8s ease-in-out;
        transform-origin: center center;
      }
      .rotated {
        transform: rotate(180deg);
      }
      .shuffling {
        animation: shake 0.3s infinite;
      }
      @keyframes shake {
        0%,
        100% {
          transform: rotate(0deg);
        }
        25% {
          transform: rotate(-10deg);
        }
        75% {
          transform: rotate(10deg);
        }
      }
      .stick {
        width: 10px;
        height: 140px;
        background: #fcd34d;
        border-radius: 5px;
        position: absolute;
        bottom: 10px;
        display: none;
        border: 1px solid #d97706;
      }
      .fall {
        animation: fallDown 1s forwards;
      }
      @keyframes fallDown {
        from {
          bottom: 10px;
        }
        to {
          bottom: -150px;
          opacity: 0;
        }
      }
    </style>
  </head>
  <body class="bg-red-50 min-h-screen p-4 flex items-center justify-center">
    <div
      class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-8 border-4 border-yellow-500 text-center"
    >
      <h1 class="text-3xl font-bold text-red-700 mb-6">
        ✨ เซียมซีเสี่ยงทาย ✨
      </h1>

      <div id="setup-area" class="mb-6 text-left">
        <label class="block text-gray-700 mb-2 font-medium"
          >กรุณาเลือกวันเกิดของคุณ:</label
        >
        <select
          id="birthday"
          class="w-full p-3 border-2 border-yellow-200 rounded-xl outline-none"
        >
          <option value="วันอาทิตย์">วันอาทิตย์</option>
          <option value="วันจันทร์">วันจันทร์</option>
          <option value="วันอังคาร">วันอังคาร</option>
          <option value="วันพุธ">วันพุธ</option>
          <option value="วันพฤหัสบดี">วันพฤหัสบดี</option>
          <option value="วันศุกร์">วันศุกร์</option>
          <option value="วันเสาร์">วันเสาร์</option>
        </select>
      </div>

      <div
        id="cup-container"
        class="mb-8 relative h-[200px] flex items-center justify-center"
      >
        <div id="cup" class="cup"><div id="stick" class="stick"></div></div>
      </div>

      <div id="action-area">
        <button
          id="shake-btn"
          class="px-10 py-4 bg-red-600 text-white font-bold rounded-full shadow-lg hover:bg-red-700 transition w-full"
        >
          เขย่ากระบอกเซียมซี
        </button>
      </div>

      <div id="result-area" class="hidden mt-8 text-left">
        <div class="text-center">
          <div
            id="fortune-number"
            class="text-6xl font-bold text-yellow-600 mb-2"
          ></div>
        </div>
        <div
          class="p-4 bg-red-50 rounded-xl border border-red-200 mb-4 italic"
          id="fortune-text"
        ></div>
        <div
          id="lucky-info"
          class="p-4 bg-yellow-50 rounded-xl mb-4 text-sm border border-yellow-200"
        >
          <p>
            🎨 สำเร็จ/งาน:
            <span id="lucky-color-success" class="font-bold"></span>
          </p>
          <p>
            💰 เงินทอง: <span id="lucky-color-money" class="font-bold"></span>
          </p>
          <p>
            ❤️ เสน่ห์/รัก: <span id="lucky-color-love" class="font-bold"></span>
          </p>
          <p>
            ❌ กาลกิณี: <span id="lucky-color-bad" class="font-bold"></span>
          </p>
          <p>
            💎 ไอเทมเสริมดวง:
            <span id="lucky-item" class="font-bold text-indigo-700"></span>
          </p>
        </div>
      </div>
    </div>

    <script>
      let luckyData = {};
      document.addEventListener("DOMContentLoaded", () => {
        google.script.run
          .withSuccessHandler((data) => (luckyData = data))
          .getLuckyData();
        document
          .getElementById("shake-btn")
          .addEventListener("click", startShake);
      });

      function startShake() {
        const cup = document.getElementById("cup");
        cup.classList.add("shuffling");
        setTimeout(() => {
          cup.classList.remove("shuffling");
          cup.classList.add("rotated");
          document.getElementById("stick").style.display = "block";
          document.getElementById("stick").classList.add("fall");
          const num = Math.floor(Math.random() * 28) + 1;
          google.script.run
            .withSuccessHandler((res) => displayFortune(num, res))
            .getFortuneFromSheet(num);
        }, 2000);
      }

      function displayFortune(num, meaning) {
        const day = document.getElementById("birthday").value;
        const d = luckyData[day] || {};

        document.getElementById("setup-area").classList.add("hidden");
        document.getElementById("cup-container").classList.add("hidden");
        document.getElementById("action-area").classList.add("hidden");
        document.getElementById("result-area").classList.remove("hidden");

        document.getElementById("fortune-number").innerText = num;
        document.getElementById("fortune-text").innerText = meaning;
        document.getElementById("lucky-color-success").innerText =
          d.colorSuccess || "-";
        document.getElementById("lucky-color-money").innerText =
          d.colorMoney || "-";
        document.getElementById("lucky-color-love").innerText =
          d.colorLove || "-";
        document.getElementById("lucky-color-bad").innerText =
          d.colorBad || "-";
        document.getElementById("lucky-item").innerText = d.item || "-";
        document.getElementById("lucky-benefit").innerText = d.benefit || "-";
      }
    </script>
  </body>
</html>
