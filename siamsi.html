<!DOCTYPE html>
<html lang="th">
<head>
  <title>Sai Mu สายมู - เสี่ยงเซียมซีวัดระฆังฯ</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Kanit', sans-serif; }
    .cup { 
      width: 120px; height: 180px; background: linear-gradient(to bottom, #b91c1c, #991b1b); 
      border-radius: 20px 20px 10px 10px; margin: 0 auto; position: relative; 
      border: 4px solid #f59e0b; display: flex; justify-content: center; align-items: flex-end; 
      transition: transform 0.8s ease-in-out; transform-origin: center center;
    }
    .rotated { transform: rotate(180deg); }
    .shuffling { animation: shake 0.3s infinite; }
    @keyframes shake { 0%, 100% { transform: rotate(0deg); } 25% { transform: rotate(-10deg); } 75% { transform: rotate(10deg); } }
    .stick { width: 10px; height: 140px; background: #fcd34d; border-radius: 5px; position: absolute; bottom: 10px; display: none; border: 1px solid #d97706; }
    .fall { animation: fallDown 1s forwards; }
    @keyframes fallDown { from { bottom: 10px; } to { bottom: -150px; opacity: 0; } }
  </style>
</head>
<body class="bg-red-50 min-h-screen p-4 flex items-center justify-center">
  
  <div class="max-w-md w-full bg-white rounded-3xl shadow-2xl p-8 border-4 border-yellow-500 text-center">
    <h1 class="text-3xl font-bold text-red-700 mb-6">✨ เซียมซีเสี่ยงทาย ✨</h1>
    
    <div id="setup-area" class="mb-6 text-left">
      <label class="block text-gray-700 mb-2 font-medium">กรุณาเลือกวันเกิดของคุณ:</label>
      <select id="birthday" class="w-full p-3 border-2 border-yellow-200 rounded-xl outline-none">
        <option value="อาทิตย์">วันอาทิตย์</option>
        <option value="จันทร์">วันจันทร์</option>
        <option value="อังคาร">วันอังคาร</option>
        <option value="พุธ">วันพุธ</option>
        <option value="พฤหัสบดี">วันพฤหัสบดี</option>
        <option value="ศุกร์">วันศุกร์</option>
        <option value="เสาร์">วันเสาร์</option>
      </select>
    </div>

    <div id="cup-container" class="mb-8 relative h-[200px] flex items-center justify-center">
      <div id="cup" class="cup"><div id="stick" class="stick"></div></div>
    </div>

    <div id="action-area">
      <button id="shake-btn" onclick="startShake()" class="px-10 py-4 bg-red-600 text-white font-bold rounded-full shadow-lg hover:bg-red-700 transition w-full">
        เขย่ากระบอกเซียมซี
      </button>
    </div>

    <div id="result-area" class="hidden mt-8">
      <div id="fortune-number" class="text-6xl font-bold text-yellow-600 mb-2"></div>
      <p id="fortune-text" class="text-gray-700 leading-relaxed mb-4"></p>
      
      <div class="p-4 bg-yellow-50 rounded-xl mb-4 border border-yellow-200 text-left text-gray-800">
        <p class="mb-1">🎨 สีมงคล: <span id="lucky-color" class="font-bold text-red-600"></span></p>
        <p class="mb-1">💎 ไอเทมนำโชค: <span id="lucky-item" class="font-bold text-red-600"></span></p>
        <p class="text-sm border-t border-yellow-200 pt-2 mt-1 italic">🌟 เสริมดวงด้าน: <span id="lucky-focus" class="text-indigo-700 font-medium"></span></p>
      </div>

      <button id="ai-advice-btn" onclick="getAIAdvice()" class="w-full mt-4 px-6 py-3 bg-indigo-600 text-white rounded-full hover:bg-indigo-700 transition">
        ✨ วิเคราะห์ดวงและรับคำแนะนำเชิงลึก
      </button>
      <div id="ai-response" class="mt-4 p-4 bg-indigo-50 rounded-xl text-left text-sm text-indigo-900 hidden"></div>
      <button onclick="location.reload()" class="mt-6 px-6 py-2 bg-gray-200 text-gray-700 rounded-full hover:bg-gray-300">เสี่ยงทายใหม่</button>
    </div>
  </div>

  <script>
    const apiKey = ""; // ใส่ OpenRouter API Key ของคุณที่นี่ (ขึ้นต้นด้วย sk-or-...)
    const aiModel = "cognitivecomputations/dolphin-mistral-24b-venice-edition:free"; // เปลี่ยนรุ่นได้ตามต้องการ
    let finalNumber = 1;

    const siamsiData = {
      1: "ใบที่หนึ่งเปรียบประดุจอาทิตย์อุทัยส่องนภา ความมืดมิดที่เคยปกคลุมชีวิตจะมลายหายไป การงานที่เคยติดขัดจะกลับมาราบรื่นดั่งใจหมาย มีเกณฑ์ได้รับข่าวดีจากทางไกล สิ่งที่เฝ้ารอคอยมานานจะสมหวังดังปรารถนา ให้หมั่นสร้างบุญบารมีแล้วโชคลาภจะตามมา",
      2: "ใบที่สองเปรียบได้กับจันทร์กระจ่างฟ้าท่ามกลางเมฆหมอก แต่ให้ระวังวาจาจะนำพาความเข้าใจผิดมาให้ การงานอาจมีอุปสรรคให้ต้องแก้ไขด้วยความใจเย็น หมั่นทำบุญกรวดน้ำอุทิศส่วนกุศลให้เจ้ากรรมนายเวร แล้วเคราะห์ร้ายจะกลายเป็นดี",
      3: "ใบที่สามเตือนเรื่องสุขภาพ ระวังอาการเจ็บป่วยที่เกิดจากความประมาทพักผ่อนน้อย ให้หันมาดูแลใส่ใจสุขภาพตนเองให้มาก ความสำเร็จในหน้าที่การงานจะเกิดขึ้นได้ต้องอาศัยความเพียรพยายามและจิตใจที่มุ่งมั่นเป็นที่ตั้ง",
      4: "ใบที่สี่เปรียบเหมือนเรือน้อยลอยลำในสายน้ำที่สงบ มีเกณฑ์ได้ลาภลอยแบบไม่คาดฝัน การเงินที่เคยฝืดเคืองจะกลับมาไหลเวียนสะดวกดั่งน้ำหลาก การติดต่อเจรจาธุรกิจการงานจะประสบความสำเร็จเกินความคาดหมาย",
      5: "ใบที่ห้าการงานมั่นคงดั่งขุนเขาที่ตั้งตระหง่าน แต่ต้องอาศัยความอดทนและมานะเป็นที่ตั้ง หากกำลังคิดจะลงทุนให้รอบคอบอย่าผลีผลาม ผู้ใหญ่จะให้การสนับสนุนช่วยเหลือในยามที่ต้องการ",
      6: "ใบที่หกความรักเบ่งบานดั่งดอกไม้แรกแย้มในฤดูใบไม้ผลิ คนโสดจะได้พบเนื้อคู่ที่รอคอยมานาน คนมีคู่ความสัมพันธ์จะแน่นแฟ้นขึ้น ใครที่รอคอยเรื่องบุตรจะมีข่าวดีในเร็ววัน",
      7: "ใบที่เจ็ดเปรียบเสมือนการเดินบนทางวิบาก ให้ระวังการลงทุน ทำสิ่งใดให้รอบคอบอย่าใจร้อนตัดสินใจ มิฉะนั้นจะเสียทรัพย์โดยใช่เหตุ ให้เชื่อสัญชาตญาณตัวเองมากกว่าฟังคำคนอื่นที่ไม่หวังดี",
      8: "ใบที่แปดหน้าที่การงานจะก้าวหน้าไปไกล มีผู้ใหญ่คอยอุปถัมภ์ค้ำชู ทำสิ่งใดก็จะมีคนเมตตาเอ็นดู ดวงชะตานี้จะมีอำนาจวาสนาเป็นที่นับหน้าถือตาในสังคม",
      9: "ใบที่เก้าเปรียบเสมือนฝนตกต้องตามฤดูกาล ความสำเร็จอยู่ไม่ไกล เพียงแค่ต้องกล้าที่จะเริ่มลงมือทำ สิ่งที่ติดค้างในใจจะได้รับการแก้ไข การเงินราบรื่นดีไม่มีเรื่องให้วิตกกังวล",
      10: "ใบที่สิบให้ระวังเรื่องการใช้จ่ายเงินทอง ต้องบริหารจัดการให้ดี รายจ่ายเริ่มมากกว่ารายรับ ให้วางแผนประหยัดอดออม ระวังเรื่องคนมายืมเงินจะกลายเป็นหนี้สูญและผิดใจกัน",
      11: "ใบที่สิบเอ็ดจะมีมิตรภาพใหม่ๆ เข้ามา ช่วยเหลือเกื้อกูลกันในยามลำบาก หากกำลังตัดสินใจเรื่องย้ายงาน จะได้พบช่องทางที่เหมาะสมกับความสามารถและนำมาซึ่งรายได้ที่ดีขึ้น",
      12: "ใบที่สิบสองเปรียบเสมือนลมพัดเปลี่ยนทิศ การงานมีการเปลี่ยนแปลง อย่าหวั่นไหว ให้รับมือด้วยสติ ปัญหาที่เจอจะเป็นบทเรียนให้คุณแกร่งขึ้น โชคชะตาจะนำสิ่งที่ดีกว่ามาให้ในภายหลัง",
      13: "ใบที่สิบสามโชคชะตาเข้าข้าง ปัญหาที่เคยหนักใจจะค่อยๆ คลี่คลายดั่งเมฆหมอกจางหาย สิ่งที่สูญหายไปจะมีคนนำมาคืน หรือได้พบในที่ที่คาดไม่ถึง เป็นช่วงเวลาแห่งการเริ่มต้นใหม่",
      14: "ใบที่สิบสี่ความรักต้องหมั่นเติมความหวาน อย่าปล่อยให้ความเฉยชาเข้ามาแทรก การงานมีภาระต้องแบกรับมาก ให้หาเวลาพักผ่อนแล้วทุกอย่างจะดีขึ้นตามลำดับ",
      15: "ใบที่สิบห้าสุขภาพกายแข็งแรงดี แต่ให้ระวังเรื่องความเครียดสะสมจากภาระหน้าที่ ปล่อยวางเรื่องไม่เป็นเรื่องบ้าง ชีวิตจะมีความสุขขึ้นอย่างเห็นได้ชัด",
      16: "ใบที่สิบหกมีเกณฑ์เดินทางไกล การเดินทางครั้งนี้จะนำโอกาสใหม่ๆ มาให้ ทั้งเรื่องมิตรภาพ รายได้ และความสำเร็จ ให้เตรียมตัวให้พร้อมสำหรับการเปลี่ยนแปลง",
      17: "ใบที่สิบเจ็ดการเงินจะมีรายได้เพิ่มจากช่องทางใหม่ๆ ที่คุณคาดไม่ถึง สิ่งที่ลงแรงไปจะเริ่มออกดอกออกผลให้ชื่นใจ เป็นช่วงที่ดวงชะตากำลังเปิดรับโชคลาภ",
      18: "ใบที่สิบแปดการงานประสบความสำเร็จ ได้รับการยอมรับจากเพื่อนร่วมงานและเจ้านาย ผู้ใหญ่เล็งเห็นความสามารถ ให้ทำหน้าที่ต่อไปด้วยความซื่อสัตย์สุจริต",
      19: "ใบที่สิบเก้าให้ระวังคนใกล้ตัวที่อาจนำปัญหามาให้ ปฏิบัติตัวให้เป็นกลาง อย่าเข้าข้างใครจนเกินพอดี การงานช่วงนี้ต้องใช้ความอดทนสูงแล้วจะผ่านไปได้",
      20: "ใบที่ยี่สิบสิ่งที่รอคอยมานานจะเริ่มเห็นผลลัพธ์ในเร็ววันนี้ ความพยายามที่สะสมมาจะส่งผลให้คุณได้รับรางวัลแห่งความสำเร็จอย่างเต็มภาคภูมิ",
      21: "ใบที่ยี่สิบเอ็ดความรักที่ผ่านพ้นมาเป็นบทเรียน ให้เริ่มใหม่ด้วยความมั่นใจ อย่าให้เรื่องในอดีตมาปิดกั้นอนาคตที่ดีกว่าที่กำลังจะเข้ามา",
      22: "ใบที่ยี่สิบสองการงานจะได้รับมอบหมายหน้าที่สำคัญ จงทำอย่างเต็มที่ สิ่งนี้จะเป็นจุดเปลี่ยนที่นำคุณไปสู่ตำแหน่งที่สูงขึ้นและความสำเร็จในอนาคต",
      23: "ใบที่ยี่สิบสามโชคลาภมักมากับความเมตตา หมั่นทำบุญทำทานแล้วชีวิตจะดีขึ้น มีคนคอยช่วยเกื้อกูลให้ผ่านพ้นอุปสรรคไปได้ด้วยดีเสมอ",
      24: "ใบที่ยี่สิบสี่สุขภาพต้องดูแลเรื่องอาหารการกินเป็นพิเศษ อย่าตามใจปากจนเสียสุขภาพ ระวังอาการเจ็บป่วยกะทันหัน ให้หมั่นออกกำลังกายอย่างสม่ำเสมอ",
      25: "ใบที่ยี่สิบห้าทุกอย่างจะเริ่มเข้าที่เข้าทาง ขอเพียงให้อดทนรอเวลา อีกไม่นานความสดใสจะกลับมาเยือนชีวิตของคุณและครอบครัว",
      26: "ใบที่ยี่สิบหกการเงินมีรายจ่ายฉุกเฉิน ควรสำรองเงินไว้ให้พร้อมเสมอ อย่าหลงเชื่อคำพูดคนเรื่องการลงทุนที่ดูเกินจริงเกินไป",
      27: "ใบที่ยี่สิบเจ็ดชีวิตช่วงนี้มีความสุขในชีวิตประจำวัน อย่าลืมหาเวลาพักผ่อนให้ตัวเองบ้าง การงานราบรื่นไร้ปัญหาให้ต้องกังวลใจ",
      28: "ใบที่ยี่สิบแปดความมุ่งมั่นจะนำพาสิ่งดีๆ มาสู่คุณ มั่นใจในตัวเองเข้าไว้ แม้จะมีอุปสรรคบ้างแต่สุดท้ายคุณจะได้รับชัยชนะอย่างแน่นอน"
    };

    const luckyData = {
        'อาทิตย์': { color: 'แดง', item: 'นาฬิกา', focus: 'การเงินและความมั่งคั่ง' },
        'จันทร์': { color: 'เหลือง/ขาว', item: 'แหวนทอง', focus: 'ความรักและเสน่ห์เมตตา' },
        'อังคาร': { color: 'ชมพู', item: 'สร้อยหินมงคล', focus: 'ความกล้าหาญและชัยชนะ' },
        'พุธ': { color: 'เขียว', item: 'ต้นไม้มงคล', focus: 'การเจริญงอกงามและสติปัญญา' },
        'พฤหัสบดี': { color: 'ส้ม/ทอง', item: 'พระเครื่อง', focus: 'โชคลาภและการคุ้มครอง' },
        'ศุกร์': { color: 'ฟ้า/น้ำเงิน', item: 'น้ำหอม', focus: 'ความสุขและความราบรื่นในชีวิต' },
        'เสาร์': { color: 'ม่วง', item: 'อัญมณีสีดำ', focus: 'ความมั่นคงและบารมี' }
    };

    function startShake() {
      const cup = document.getElementById('cup');
      const stick = document.getElementById('stick');
      const btn = document.getElementById('shake-btn');
      
      btn.disabled = true;
      cup.classList.add('shuffling');
      stick.style.display = 'block';
      
      setTimeout(() => {
        cup.classList.remove('shuffling');
        cup.classList.add('rotated'); // หมุน 180 องศา
        
        setTimeout(() => {
            stick.classList.add('fall');
            finalNumber = Math.floor(Math.random() * 28) + 1;
            setTimeout(showResult, 1000);
        }, 500);
      }, 2000);
    }

    function showResult() {
      const birthday = document.getElementById('birthday').value;
      document.getElementById('setup-area').classList.add('hidden');
      document.getElementById('cup-container').classList.add('hidden');
      document.getElementById('action-area').classList.add('hidden');
      document.getElementById('result-area').classList.remove('hidden');
      
      document.getElementById('fortune-number').innerText = finalNumber;
      document.getElementById('fortune-text').innerText = siamsiData[finalNumber];
      
      document.getElementById('lucky-color').innerText = luckyData[birthday].color;
      document.getElementById('lucky-item').innerText = luckyData[birthday].item;
      document.getElementById('lucky-focus').innerText = luckyData[birthday].focus;
    }

    async function getAIAdvice() {
      const birthday = document.getElementById('birthday').value;
      const aiDiv = document.getElementById('ai-response');
      document.getElementById('ai-advice-btn').disabled = true;
      aiDiv.classList.remove('hidden');
      aiDiv.innerText = "กำลังวิเคราะห์ดวงชะตา...";
      
      const prompt = `ผู้ใช้งานเกิดวัน${birthday} ได้เลขเซียมซีที่ ${finalNumber} ซึ่งมีคำทำนายว่า "${siamsiData[finalNumber]}" ช่วยเสริมดวงด้าน "${luckyData[birthday].focus}" โดยมีไอเทมมงคลคือ "${luckyData[birthday].item}" ช่วยวิเคราะห์คำทำนายและแนะนำวิธีเสริมดวงให้หน่อย`;

      try {
        const response = await fetch("https://openrouter.ai/api/v1/chat/completions", {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${apiKey}`,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            model: aiModel,
            messages: [{ role: 'user', content: prompt }]
          })
        });
        const result = await response.json();
        aiDiv.innerText = result.choices[0].message.content;
      } catch (e) { aiDiv.innerText = "ขออภัย ระบบขัดข้อง"; }
    }
  </script>
</body>
</html>
